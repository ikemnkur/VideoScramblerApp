<!DOCTYPE html>
<html>
<head>
    <title>Video Frequency Separation Demo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        canvas, video { border: 1px solid #ccc; max-width: 300px; margin: 10px; background: black; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .box { display: flex; flex-direction: column; align-items: center; }
        h3 { margin-bottom: 5px; font-size: 14px; }
        .upload-section { margin: 20px 0; padding: 20px; background: white; border-radius: 8px; display: inline-block; }
        input[type="file"] { padding: 10px; font-size: 14px; }
        .instructions { color: #666; font-size: 14px; margin-top: 10px; }
        .controls { margin: 20px 0; padding: 15px; background: white; border-radius: 8px; display: inline-block; }
        button { padding: 10px 20px; margin: 5px; font-size: 14px; cursor: pointer; }
        .info { color: #666; font-size: 12px; margin-top: 5px; }
        #videoSource { display: none; }
    </style>
</head>
<body>
    <h2>Video Frequency Separation Test</h2>
    <p>Low Pass + High Pass = Original (Frame-by-Frame)</p>
    
    <div class="upload-section">
        <input type="file" id="videoUpload" accept="video/*">
        <div class="instructions">Upload a video to see real-time frequency separation</div>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <button id="playPause">Play</button>
        <button id="restart">Restart</button>
        <div class="info" id="info">Ready</div>
    </div>
    
    <video id="videoSource" controls></video>
    
    <div class="container">
        <div class="box">
            <h3>1. Original</h3>
            <canvas id="canvasOrig"></canvas>
        </div>
        <div class="box">
            <h3>2. Low-Pass (Blur)</h3>
            <canvas id="canvasLow"></canvas>
        </div>
        <div class="box">
            <h3>3. High-Pass (Detail)</h3>
            <canvas id="canvasHigh"></canvas>
        </div>
        <div class="box">
            <h3>4. Reconstructed</h3>
            <canvas id="canvasResult"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoSource');
        const canvasOrig = document.getElementById('canvasOrig');
        const canvasLow = document.getElementById('canvasLow');
        const canvasHigh = document.getElementById('canvasHigh');
        const canvasResult = document.getElementById('canvasResult');
        
        const ctxOrig = canvasOrig.getContext('2d', { willReadFrequently: true });
        const ctxLow = canvasLow.getContext('2d', { willReadFrequently: true });
        const ctxHigh = canvasHigh.getContext('2d', { willReadFrequently: true });
        const ctxRes = canvasResult.getContext('2d', { willReadFrequently: true });

        const playPauseBtn = document.getElementById('playPause');
        const restartBtn = document.getElementById('restart');
        const infoDiv = document.getElementById('info');

        let animationId = null;
        let isProcessing = false;
        let frameCount = 0;
        let lastTime = 0;
        let fps = 0;

        function setupCanvases(width, height) {
            // Limit canvas size to reasonable dimensions
            const maxDim = 640;
            let canvasWidth = width;
            let canvasHeight = height;
            
            if (width > maxDim || height > maxDim) {
                const scale = maxDim / Math.max(width, height);
                canvasWidth = Math.floor(width * scale);
                canvasHeight = Math.floor(height * scale);
            }

            [canvasOrig, canvasLow, canvasHigh, canvasResult].forEach(canvas => {
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
            });

            return { canvasWidth, canvasHeight };
        }

        function processVideoFrame(timestamp) {
            if (!video.paused && !video.ended) {
                const { canvasWidth, canvasHeight } = { 
                    canvasWidth: canvasOrig.width, 
                    canvasHeight: canvasOrig.height 
                };

                // Calculate FPS
                if (lastTime) {
                    const delta = timestamp - lastTime;
                    fps = Math.round(1000 / delta);
                }
                lastTime = timestamp;
                frameCount++;

                // 1. Draw Original
                ctxOrig.drawImage(video, 0, 0, canvasWidth, canvasHeight);
                const origData = ctxOrig.getImageData(0, 0, canvasWidth, canvasHeight);

                // 2. Create Low-Pass (using blur filter)
                ctxLow.filter = 'blur(4px)';
                ctxLow.drawImage(video, 0, 0, canvasWidth, canvasHeight);
                ctxLow.filter = 'none'; // Reset filter
                const lowData = ctxLow.getImageData(0, 0, canvasWidth, canvasHeight);

                // 3. Calculate High-Pass (Original - LowPass)
                const highData = ctxHigh.createImageData(canvasWidth, canvasHeight);
                
                // 4. Calculate Reconstruction (LowPass + HighPass)
                const resData = ctxRes.createImageData(canvasWidth, canvasHeight);

                for (let i = 0; i < origData.data.length; i += 4) {
                    for (let j = 0; j < 3; j++) { // RGB channels
                        const idx = i + j;
                        // High-Pass: Center around 128 for visualization
                        const diff = origData.data[idx] - lowData.data[idx];
                        highData.data[idx] = diff + 128 + 32; 
                        
                        // Reconstruction: Low + (High - 128)
                        resData.data[idx] = lowData.data[idx] + diff;
                    }
                    highData.data[i + 3] = 255; // Alpha
                    resData.data[i + 3] = 255;  // Alpha
                }

                ctxHigh.putImageData(highData, 0, 0);
                ctxRes.putImageData(resData, 0, 0);

                // Update info
                const currentTime = video.currentTime.toFixed(2);
                const duration = video.duration.toFixed(2);
                infoDiv.textContent = `Frame: ${frameCount} | FPS: ${fps} | Time: ${currentTime}s / ${duration}s`;

                animationId = requestAnimationFrame(processVideoFrame);
            } else {
                isProcessing = false;
                playPauseBtn.textContent = 'Play';
                if (video.ended) {
                    infoDiv.textContent = `Video ended - Frame: ${frameCount} | Total time: ${video.duration.toFixed(2)}s`;
                }
            }
        }

        function startProcessing() {
            if (!isProcessing && !video.ended) {
                isProcessing = true;
                video.play();
                playPauseBtn.textContent = 'Pause';
                animationId = requestAnimationFrame(processVideoFrame);
            }
        }

        function stopProcessing() {
            if (isProcessing) {
                isProcessing = false;
                video.pause();
                playPauseBtn.textContent = 'Play';
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }
        }

        // Play/Pause toggle
        playPauseBtn.addEventListener('click', () => {
            if (isProcessing) {
                stopProcessing();
            } else {
                startProcessing();
            }
        });

        // Restart button
        restartBtn.addEventListener('click', () => {
            video.currentTime = 0;
            frameCount = 0;
            lastTime = 0;
            fps = 0;
            if (!isProcessing) {
                startProcessing();
            }
        });

        // Video events
        video.addEventListener('ended', () => {
            stopProcessing();
        });

        video.addEventListener('loadedmetadata', () => {
            const dims = setupCanvases(video.videoWidth, video.videoHeight);
            infoDiv.textContent = `Video loaded: ${video.videoWidth}x${video.videoHeight} → Canvas: ${dims.canvasWidth}x${dims.canvasHeight}`;
            document.getElementById('controls').style.display = 'inline-block';
            playPauseBtn.textContent = 'Play';
        });

        // Handle file upload
        document.getElementById('videoUpload').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('video/')) {
                alert('Please select a valid video file');
                return;
            }

            // Stop current processing if any
            if (isProcessing) {
                stopProcessing();
            }

            // Reset counters
            frameCount = 0;
            lastTime = 0;
            fps = 0;

            // Clean up old URL
            if (video.src && video.src.startsWith('blob:')) {
                URL.revokeObjectURL(video.src);
            }

            const url = URL.createObjectURL(file);
            video.src = url;
            video.load();

            infoDiv.textContent = 'Loading video...';
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (video.src && video.src.startsWith('blob:')) {
                URL.revokeObjectURL(video.src);
            }
        });
    </script>
</body>
</html>
