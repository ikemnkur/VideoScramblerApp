<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPU Image Frequency Separator</title>

<style>

body{
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  text-align:center;
}

canvas{
  border:1px solid #444;
  margin:10px;
  max-width: 100%;
  height: auto;
}

.row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items: flex-start;
}

.block{
  margin: 10px;
}

.controls{
  margin:20px;
  padding: 20px;
  background: #1a1a1a;
  border-radius: 8px;
  display: inline-block;
}

.controls label{
  display: block;
  margin: 10px 0;
}

.controls input[type="range"]{
  width: 200px;
  margin: 0 10px;
}

#lowValue, #highValue{
  display: inline-block;
  min-width: 30px;
  font-weight: bold;
  color: #4CAF50;
}

</style> 

</head>
<body>

<h2>GPU Image Frequency Separation (WebGL)</h2>

<input type="file" id="upload">

<div class="controls">

<label>
  Low Blur Radius: <span id="lowValue">5</span>
  <input type="range" id="lowRadius" min="1" max="20" value="5">
</label>
<br><br>
<label>
  High Blur Radius: <span id="highValue">30</span>
  <input type="range" id="highRadius" min="10" max="80" value="30">
</label>

</div>

<div class="row">
   <div class="block">
            <p>Original</p>
            <canvas id="original"></canvas> 
            
            <p>Frequency Separation</p>
            --------------------------------------------------------------------------
        <!--  -->
        <br>  
       
       
        </br>
        <div style="display: flex; flex-direction: row;">
          
            <div class="block">
                <p>Low Pass (Blur)</p>
                <canvas id="low"></canvas>
            </div>

            <div class="block">
                <p>Medium Detail</p>
                <canvas id="medium"></canvas>
            </div>

            <div class="block">
                <p>High Pass (Edges)</p>
                <canvas id="high"></canvas>
            </div>


        </div>

</div>

<script>

let sourceImage = null
let imgWidth = 0
let imgHeight = 0

// Shader programs for each canvas
const canvases = {
  original: null,
  low: null,
  medium: null,
  high: null
}

const contexts = {
  original: null,
  low: null,
  medium: null,
  high: null
}

const vertexShaderSource = `#version 300 es
in vec2 position;
out vec2 uv;

void main(){
  uv = (position + 1.0) * 0.5;
  gl_Position = vec4(position,0,1);
}
`

const blurFragmentShader = `#version 300 es
precision highp float;

uniform sampler2D image;
uniform float radius;
uniform vec2 resolution;

in vec2 uv;
out vec4 outColor;

vec4 blur(){
  vec2 texel = 1.0 / resolution;
  vec4 sum = vec4(0.0);
  float count = 0.0;

  int r = int(radius * 2.0);
  
  for(int x=-r; x<=r; x++){
    for(int y=-r; y<=r; y++){
      vec2 offset = vec2(float(x),float(y)) * texel;
      sum += texture(image, uv + offset);
      count += 1.0;
    }
  }

  return sum / count;
}

void main(){
  outColor = blur();
}
`

const passthroughFragmentShader = `#version 300 es
precision highp float;

uniform sampler2D image;
in vec2 uv;
out vec4 outColor;

void main(){
  outColor = texture(image, uv);
}
`

const subtractFragmentShader = `#version 300 es
precision highp float;

uniform sampler2D image;
uniform sampler2D blurred;
in vec2 uv;
out vec4 outColor;

void main(){
  vec4 original = texture(image, uv);
  vec4 blur = texture(blurred, uv);
  // High pass = original - blur, centered at 0.5
  outColor = vec4((original.rgb - blur.rgb) + 0.5, 1.0);
}
`

function createShader(gl, type, source){
  let s = gl.createShader(type)
  gl.shaderSource(s, source)
  gl.compileShader(s)
  
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:', gl.getShaderInfoLog(s))
  }
  
  return s
}

function createProgram(gl, v, f){
  let p = gl.createProgram()
  gl.attachShader(p, v)
  gl.attachShader(p, f)
  gl.linkProgram(p)
  
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(p))
  }
  
  return p
}

function initGLContext(canvas, fragmentShader){
  let gl = canvas.getContext("webgl2")
  if (!gl) {
    console.error('WebGL2 not supported')
    return null
  }

  let v = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource)
  let f = createShader(gl, gl.FRAGMENT_SHADER, fragmentShader)
  let program = createProgram(gl, v, f)

  gl.useProgram(program)

  let quad = new Float32Array([
    -1, -1,
    1, -1,
    -1, 1,
    1, 1
  ])

  let buffer = gl.createBuffer()
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer)
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW)

  let pos = gl.getAttribLocation(program, "position")
  gl.enableVertexAttribArray(pos)
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0)

  return { gl, program }
}

function loadTextureToGL(gl, image){
  let texture = gl.createTexture()
  gl.bindTexture(gl.TEXTURE_2D, texture)
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE)
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE)
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR)
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR)
  
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image)
  
  return texture
}

function renderAll(){
  if (!sourceImage) return

  let lowRadius = parseFloat(document.getElementById("lowRadius").value)
  let highRadius = parseFloat(document.getElementById("highRadius").value)

  // 1. Render original image
  let origCtx = contexts.original
  if (origCtx && origCtx.gl) {
    origCtx.gl.clear(origCtx.gl.COLOR_BUFFER_BIT)
    origCtx.gl.drawArrays(origCtx.gl.TRIANGLE_STRIP, 0, 4)
  }

  // 2. Render low pass (blur with high radius)
  let lowCtx = contexts.low
  if (lowCtx && lowCtx.gl) {
    let radiusLoc = lowCtx.gl.getUniformLocation(lowCtx.program, "radius")
    let resLoc = lowCtx.gl.getUniformLocation(lowCtx.program, "resolution")
    
    lowCtx.gl.uniform1f(radiusLoc, highRadius)
    lowCtx.gl.uniform2f(resLoc, imgWidth, imgHeight)
    lowCtx.gl.clear(lowCtx.gl.COLOR_BUFFER_BIT)
    lowCtx.gl.drawArrays(lowCtx.gl.TRIANGLE_STRIP, 0, 4)
  }

  // 3. Render medium detail (blur with low radius)
  let medCtx = contexts.medium
  if (medCtx && medCtx.gl) {
    let radiusLoc = medCtx.gl.getUniformLocation(medCtx.program, "radius")
    let resLoc = medCtx.gl.getUniformLocation(medCtx.program, "resolution")
    
    medCtx.gl.uniform1f(radiusLoc, lowRadius)
    medCtx.gl.uniform2f(resLoc, imgWidth, imgHeight)
    medCtx.gl.clear(medCtx.gl.COLOR_BUFFER_BIT)
    medCtx.gl.drawArrays(medCtx.gl.TRIANGLE_STRIP, 0, 4)
  }

  // 4. Render high pass (edges - original minus blur)
  // For simplicity, we'll use canvas 2D for subtraction
  let highCanvas = canvases.high
  let highCtx2D = highCanvas.getContext('2d')
  
  // Draw original
  highCtx2D.drawImage(sourceImage, 0, 0)
  let originalData = highCtx2D.getImageData(0, 0, imgWidth, imgHeight)
  
  // Get low pass data
  let lowCanvas = canvases.low
  let lowCtx2D = lowCanvas.getContext('2d', { willReadFrequently: true })
  let lowData = lowCtx2D.getImageData(0, 0, imgWidth, imgHeight)
  
  // Subtract: high = original - low + 128 (to center around gray)
  for(let i = 0; i < originalData.data.length; i += 4) {
    originalData.data[i] = Math.min(255, Math.max(0, originalData.data[i] - lowData.data[i] + 128))
    originalData.data[i+1] = Math.min(255, Math.max(0, originalData.data[i+1] - lowData.data[i+1] + 128))
    originalData.data[i+2] = Math.min(255, Math.max(0, originalData.data[i+2] - lowData.data[i+2] + 128))
  }
  
  highCtx2D.putImageData(originalData, 0, 0)
}

function setupCanvas(id, fragmentShader){
  let canvas = document.getElementById(id)
  canvas.width = imgWidth
  canvas.height = imgHeight
  
  let ctx = initGLContext(canvas, fragmentShader)
  if (!ctx) return null
  
  // Load source image as texture
  loadTextureToGL(ctx.gl, sourceImage)
  
  // Set texture uniform
  let imgLoc = ctx.gl.getUniformLocation(ctx.program, "image")
  ctx.gl.uniform1i(imgLoc, 0)
  
  canvases[id] = canvas
  contexts[id] = ctx
  
  return ctx
}

document.getElementById("upload").addEventListener("change", e => {
  let file = e.target.files[0]
  if (!file) return

  let img = new Image()

  img.onload = () => {
    sourceImage = img
    imgWidth = img.width
    imgHeight = img.height

    // Setup all canvases
    setupCanvas("original", passthroughFragmentShader)
    setupCanvas("low", blurFragmentShader)
    setupCanvas("medium", blurFragmentShader)
    
    // Setup high pass canvas (using 2D for subtraction)
    let highCanvas = document.getElementById("high")
    highCanvas.width = imgWidth
    highCanvas.height = imgHeight
    canvases.high = highCanvas

    // Initial render
    renderAll()
  }

  img.src = URL.createObjectURL(file)
})

// Update on slider change
document.getElementById("lowRadius").addEventListener("input", e => {
  document.getElementById("lowValue").textContent = e.target.value
  renderAll()
})

document.getElementById("highRadius").addEventListener("input", e => {
  document.getElementById("highValue").textContent = e.target.value
  renderAll()
})

</script>

</body>
</html>
